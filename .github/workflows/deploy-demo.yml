name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout instant-astronomer
        uses: actions/checkout@v4
        with:
          path: instant-astronomer

      # The workspace `Cargo.toml` patches `agg-gui` to ../agg-gui/agg-gui
      # (see CLAUDE.md "Local development uses agg-gui as a path dep"), so
      # CI needs the sibling layout to resolve the patch.
      - name: Checkout sibling agg-gui
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-gui
          path: agg-gui

      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            instant-astronomer/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('instant-astronomer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install demo dependencies
        working-directory: instant-astronomer/demo
        run: bun install

      - name: Build WASM
        working-directory: instant-astronomer
        run: |
          wasm-pack build instant-astronomer-wasm \
            --target web \
            --out-dir ../demo/public/pkg \
            --no-typescript

      - name: Bundle TypeScript
        working-directory: instant-astronomer/demo
        run: bun run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: instant-astronomer/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

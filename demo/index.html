<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a19" />
    <title>Instant-Astronomer</title>
    <style>
      /* Bootstrap-only styling. All visible UI (buttons, labels, toggles,
         status text) is painted by agg-gui into the canvas — per the
         agg-gui-only architecture rule in CLAUDE.md. The HTML/CSS here
         only owns the canvas placement and the iOS permission gate. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a19;
        color: #e7e7f5;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        overflow: hidden;
        height: 100%;
        height: 100dvh;
        width: 100%;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        height: 100dvh;
      }
      #astronomer-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        touch-action: none;
      }
      /* Centered permission gate shown only on iOS, where DeviceOrientation
         requires an explicit user gesture before sensors stream. */
      #permission-gate {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 25, 0.9);
        z-index: 10;
      }
      #permission-gate[data-visible="true"] {
        display: flex;
      }
      #permission-gate .card {
        max-width: 22rem;
        padding: 1.5rem 1.75rem;
        background: #14142a;
        border: 1px solid #2b2b4d;
        border-radius: 12px;
        text-align: center;
      }
      #permission-gate h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      #permission-gate p {
        margin: 0 0 1rem;
        font-size: 0.95rem;
        line-height: 1.4;
        color: #b8b8d8;
      }
      #permission-gate button {
        appearance: none;
        background: #3b82f6;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.7rem 1.2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      #permission-gate button:active {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <canvas id="astronomer-canvas" width="900" height="700"></canvas>
    <div id="permission-gate">
      <div class="card">
        <h1>Point at the sky</h1>
        <p>
          Instant-Astronomer needs permission to read your phone's compass and
          tilt sensors so it can show which stars and planets you're looking at.
        </p>
        <button id="enable-sensors" type="button">Enable compass</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
